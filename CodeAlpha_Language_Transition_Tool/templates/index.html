<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Translation Tool | CodeAlpha AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- ── Animated Background Blobs ── -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <i class="fa-solid fa-language"></i>
        <span>TranslateAI</span>
      </div>
      <p class="tagline">Powered by Google Translate · CodeAlpha AI Internship</p>
    </div>
  </header>

  <!-- ── Main App ── -->
  <main class="container">

    <!-- Language Selector Bar -->
    <div class="lang-bar">
      <div class="lang-group">
        <label for="source-lang"><i class="fa-solid fa-globe"></i> Source Language</label>
        <select id="source-lang">
          {% for code, name in languages.items() %}
          <option value="{{ code }}" {% if code == 'auto' %}selected{% endif %}>{{ name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Swap Button -->
      <button class="swap-btn" id="swap-btn" title="Swap languages">
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
      </button>

      <div class="lang-group">
        <label for="target-lang"><i class="fa-solid fa-flag"></i> Target Language</label>
        <select id="target-lang">
          {% for code, name in languages.items() %}
          {% if code != 'auto' %}
          <option value="{{ code }}" {% if code == 'ta' %}selected{% endif %}>{{ name }}</option>
          {% endif %}
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Text Areas -->
    <div class="text-panel">

      <!-- Input Panel -->
      <div class="panel input-panel">
        <div class="panel-header">
          <span>Original Text</span>
          <span class="char-count" id="char-count">0 / 5000</span>
        </div>
        <textarea
          id="input-text"
          placeholder="Enter text to translate…"
          maxlength="5000"
          spellcheck="true"
        ></textarea>
        <div class="panel-footer">
          <button class="btn btn-clear" id="clear-btn">
            <i class="fa-solid fa-xmark"></i> Clear
          </button>
          <button class="btn btn-translate" id="translate-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Translate
          </button>
        </div>
      </div>

      <!-- Output Panel -->
      <div class="panel output-panel">
        <div class="panel-header">
          <span>Translated Text</span>
          <button class="icon-btn" id="copy-btn" title="Copy translation" disabled>
            <i class="fa-regular fa-copy"></i>
          </button>
        </div>

        <!-- Loading spinner (hidden by default) -->
        <div class="loader" id="loader">
          <div class="spinner"></div>
          <p>Translating…</p>
        </div>

        <!-- Translation result -->
        <div class="output-text" id="output-text">
          <span class="placeholder">Translation will appear here…</span>
        </div>

        <!-- Error message -->
        <div class="error-msg" id="error-msg" style="display:none;">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="error-text"></span>
        </div>

        <div class="panel-footer">
          <button class="btn btn-copy-full" id="copy-full-btn" disabled>
            <i class="fa-solid fa-clipboard"></i> Copy Translation
          </button>
        </div>
      </div>

    </div><!-- /.text-panel -->

    <!-- Toast notification -->
    <div class="toast" id="toast">
      <i class="fa-solid fa-check-circle"></i> Copied to clipboard!
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>Built with <i class="fa-solid fa-heart" style="color:#f472b6;"></i> by Boopathi · CodeAlpha AI Internship · Task 1</p>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
